[PHP]
; Ограничения памяти и времени
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000
post_max_size = 100M
upload_max_filesize = 100M

; Ошибки и логи (для разработки)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php_errors.log

; Дата и время
date.timezone = Europe/Moscow

; Загрузка файлов
file_uploads = On
upload_tmp_dir = /tmp

; Сессии
session.gc_maxlifetime = 7200
session.cookie_lifetime = 0
session.cookie_httponly = 1
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1

; Расширения
extension=pdo_mysql
extension=mysqli
extension=mbstring
extension=curl
extension=json
extension=openssl
extension=gd
extension=intl