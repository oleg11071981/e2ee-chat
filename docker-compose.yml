version: '3.8'

services:
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: e2ee-php
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    environment:
      - PHP_IDE_CONFIG=serverName=e2ee-chat
    networks:
      - e2ee-network
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: e2ee-nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/sites:/etc/nginx/conf.d
    networks:
      - e2ee-network
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    container_name: e2ee-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: e2ee_chat
      MYSQL_USER: e2ee_user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - e2ee-network
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: e2ee-phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 100M
    networks:
      - e2ee-network
    depends_on:
      - mysql

  mailhog:  # ← ВАЖНО: теперь внутри services
    image: mailhog/mailhog
    container_name: e2ee-mailhog
    ports:
      - "1025:1025"  # SMTP порт
      - "8025:8025"  # Web интерфейс
    networks:
      - e2ee-network

volumes:
  mysql_data:

networks:
  e2ee-network:
    driver: bridge