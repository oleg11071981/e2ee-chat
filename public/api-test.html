<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title><!DOCTYPE html>
        <html lang="ru">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🔐 E2EE Chat API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
        }
        h3 {
            margin-top: 20px;
            color: #555;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 250px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }
        button:hover {
            background: #5a67d8;
        }
        .response {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .token {
            word-break: break-all;
            background: #e8f5e9;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #4caf50;
            margin-top: 10px;
        }
        .section {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 E2EE Chat API Test</h1>

    <div class="section">
        <h3>📝 Регистрация</h3>
        <input id="regUsername" placeholder="Имя пользователя" value="testuser"><br>
        <input id="regEmail" placeholder="Email" value="test@example.com"><br>
        <input id="regPassword" type="password" placeholder="Пароль" value="12345678"><br>
        <button onclick="testRegister()">Зарегистрироваться</button>
    </div>

    <div class="section">
        <h3>🔑 Вход</h3>
        <input id="loginLogin" placeholder="Email или имя пользователя" value="test@example.com"><br>
        <input id="loginPassword" type="password" placeholder="Пароль" value="12345678"><br>
        <button onclick="testLogin()">Войти</button>
    </div>

    <div class="section">
        <h3>👤 Профиль (требуется вход)</h3>
        <button onclick="testProfile()">Получить профиль</button>
    </div>

    <div class="response" id="response">
        <p>Нажмите кнопку для тестирования API</p>
    </div>
</div>

<script>
    let token = '';

    async function testRegister() {
        const data = {
            username: document.getElementById('regUsername').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value
        };

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            document.getElementById('response').innerHTML =
                '<h3>Ответ:</h3><pre>' + JSON.stringify(result, null, 2) + '</pre>';
        } catch (error) {
            document.getElementById('response').innerHTML =
                '<h3>Ошибка:</h3><pre>' + error + '</pre>';
        }
    }

    async function testLogin() {
        const data = {
            login: document.getElementById('loginLogin').value,
            password: document.getElementById('loginPassword').value
        };

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            if (result.data?.access_token) {
                token = result.data.access_token;
            }
            document.getElementById('response').innerHTML =
                '<h3>Ответ:</h3><pre>' + JSON.stringify(result, null, 2) + '</pre>' +
                '<div class="token">🔑 Токен: ' + token + '</div>';
        } catch (error) {
            document.getElementById('response').innerHTML =
                '<h3>Ошибка:</h3><pre>' + error + '</pre>';
        }
    }

    async function testProfile() {
        if (!token) {
            document.getElementById('response').innerHTML =
                '<h3>Ошибка:</h3><pre>Сначала выполните вход</pre>';
            return;
        }

        try {
            const res = await fetch('/api/profile', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            const result = await res.json();
            document.getElementById('response').innerHTML =
                '<h3>Ответ:</h3><pre>' + JSON.stringify(result, null, 2) + '</pre>';
        } catch (error) {
            document.getElementById('response').innerHTML =
                '<h3>Ошибка:</h3><pre>' + error + '</pre>';
        }
    }
</script>
</body>
</html></title>
</head>
